<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Whoosha · Home Carousel Prototype</title>
<style>
  :root {
    --bg: #9FBFB4;            /* eucalyptus sage */
    --text-forest: #3E5E52;
    --text-sage: #6D9B8A;
    --primary: #4A9B7F;
    --amber: #D4A056;
    --teal: #5B9FAA;
    --lavender: #9B8FC4;
    --warm-sage: #A0C8B0;

    --card-w: 200px;
    --card-h: 280px;
    --pivot-y: 380px;        /* distance below card center to fan around — controls spread */
    --rot-step: 11deg;       /* per-step rotation */
    --scale-step: 0.05;      /* per-step scale reduction */
    --transition: transform 350ms cubic-bezier(0.22, 1, 0.36, 1), opacity 250ms ease;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-forest);
    overflow: hidden;
    user-select: none;
  }

  /* ── Header ───────────────────────────────────────────────────── */
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .logo {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-forest);
  }
  .parent-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(62, 94, 82, 0.12);
    display: grid;
    place-items: center;
    cursor: pointer;
  }
  .greeting {
    position: absolute;
    top: 78px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--text-forest);
    z-index: 50;
  }

  /* ── Carousel ─────────────────────────────────────────────────── */
  .carousel-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -42%);
    width: 100%;
    max-width: 900px;
    height: 360px;
    display: grid;
    grid-template-columns: 56px 1fr 56px;
    align-items: center;
    gap: 8px;
    z-index: 10;
    touch-action: pan-y;
  }
  .carousel {
    position: relative;
    height: 100%;
  }

  .chevron {
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--text-forest);
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 200ms ease, transform 150ms ease;
    z-index: 20;
  }
  .chevron:hover { background: rgba(255, 255, 255, 0.6); }
  .chevron:active { transform: scale(0.94); }
  .chevron:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ── Card positioning (the fan!) ─────────────────────────────── */
  .card {
    position: absolute;
    top: 0;
    left: 50%;
    width: var(--card-w);
    height: var(--card-h);
    margin-left: calc(var(--card-w) / -2);
    transform-origin: 50% var(--pivot-y);
    transition: var(--transition);
    cursor: pointer;
    will-change: transform;
  }
  .card-inner {
    width: 100%; height: 100%;
    border-radius: 24px;
    box-shadow: 0 12px 32px rgba(62, 94, 82, 0.22), 0 2px 6px rgba(62, 94, 82, 0.12);
    overflow: hidden;
    position: relative;
    transition: filter 250ms ease;
  }
  .card-art {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px 16px;
    text-align: center;
  }
  .card-shape {
    width: 110px;
    height: 110px;
    display: grid;
    place-items: center;
  }
  .card-shape svg { width: 100%; height: 100%; }
  .card-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 19px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text-forest);
  }
  .card-tagline {
    font-size: 12px;
    color: var(--text-sage);
    margin-top: -8px;
  }

  /* per-game palettes (card background tints) */
  .card[data-game="square"]    .card-inner { background: linear-gradient(160deg, #C8E0CD, #A0C8B0); }
  .card[data-game="hexagon"]   .card-inner { background: linear-gradient(160deg, #B6D7DC, #88B5BD); }
  .card[data-game="infinity"]  .card-inner { background: linear-gradient(160deg, #D2C9E5, #B0A3D0); }
  .card[data-game="flower"]    .card-inner { background: linear-gradient(160deg, #EBD4A8, #D6B27C); }
  .card[data-game="placeholder"] .card-inner { background: linear-gradient(160deg, #E0E8DF, #BFCEC1); }

  /* Lock badge */
  .lock-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: rgba(62, 94, 82, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: grid;
    place-items: center;
    color: white;
    z-index: 5;
  }
  .lock-badge svg { width: 16px; height: 16px; }

  /* Locked / frosted state */
  .card.locked .card-inner { filter: blur(2px) saturate(0.55); }
  /* Placeholders keep the name readable but mystery-shape behind frost */
  .card.placeholder .card-name { color: var(--text-sage); font-style: italic; }
  .card.placeholder .card-inner { filter: blur(1.5px) saturate(0.4); }

  /* ── Position / state ───────────────────────────────────────── */
  /* JS sets --d (signed distance from center) per card. */
  .card[data-d="0"]   { transform: rotate(0deg)     scale(1.00); z-index: 10; }
  .card[data-d="1"]   { transform: rotate(11deg)    scale(0.95); z-index: 9; }
  .card[data-d="-1"]  { transform: rotate(-11deg)   scale(0.95); z-index: 9; }
  .card[data-d="2"]   { transform: rotate(22deg)    scale(0.90); z-index: 8; }
  .card[data-d="-2"]  { transform: rotate(-22deg)   scale(0.90); z-index: 8; }
  .card[data-d="3"]   { transform: rotate(33deg)    scale(0.85); z-index: 7; }
  .card[data-d="-3"]  { transform: rotate(-33deg)   scale(0.85); z-index: 7; }
  .card[data-d="4"]   { transform: rotate(44deg)    scale(0.80); z-index: 6; }
  .card[data-d="-4"]  { transform: rotate(-44deg)   scale(0.80); z-index: 6; }

  /* Beyond visible fan: fade and hide */
  .card.offscreen { opacity: 0; pointer-events: none; }

  /* ── Coming Soon overlay ────────────────────────────────────── */
  .coming-soon {
    position: absolute;
    inset: 0;
    background: rgba(62, 94, 82, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: grid;
    place-items: center;
    color: white;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 250ms ease;
  }
  .coming-soon.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .coming-soon-text {
    background: rgba(255, 255, 255, 0.08);
    padding: 22px 40px;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.32);
    letter-spacing: 0.3px;
  }

  /* ── Footer hint ────────────────────────────────────────────── */
  .hint {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: var(--text-forest);
    opacity: 0.55;
    z-index: 50;
  }

  /* Touch-primary devices (phones AND tablets) hide chevrons — swipe is the
     intuitive gesture there. Desktops with a mouse keep the chevrons. This
     is more accurate than a width-based breakpoint, which would catch
     desktop windows narrowed below 600px and miss large tablets. */
  @media (hover: none) and (pointer: coarse) {
    .chevron { display: none; }
    .carousel-wrap { grid-template-columns: 1fr; padding: 0 24px; }
  }
</style>
</head>
<body>

  <header>
    <div class="logo">whoosha</div>
    <div class="parent-icon" aria-label="account">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
      </svg>
    </div>
  </header>

  <div class="greeting">Hi Lily 🌿</div>

  <div class="carousel-wrap">
    <button class="chevron" id="prev" aria-label="previous game">‹</button>
    <div class="carousel" id="carousel"></div>
    <button class="chevron" id="next" aria-label="next game">›</button>
  </div>

  <div class="hint">Swipe, arrow keys, or click the side cards · Tap a card to play</div>

  <div class="coming-soon" id="comingSoon">
    <div class="coming-soon-text">Coming Soon</div>
  </div>

<script>
  // ───────────────────────────────────────────────────────────────
  // Game data — positions left-to-right (Square at index 3 = center)
  // ───────────────────────────────────────────────────────────────
  const games = [
    { id: 'p1',       name: 'more breath soon', tagline: '',                    game: 'placeholder', locked: true,  placeholder: true,  shape: 'mystery' },
    { id: 'p2',       name: 'more breath soon', tagline: '',                    game: 'placeholder', locked: true,  placeholder: true,  shape: 'mystery' },
    { id: 'infinity', name: 'Infinity Breathing', tagline: 'Trace the infinity', game: 'infinity',   locked: true,  placeholder: false, shape: 'infinity' },
    { id: 'square',   name: 'Square Breathing',   tagline: 'Trace the square',   game: 'square',     locked: false, placeholder: false, shape: 'square'   },
    { id: 'hexagon',  name: 'Hexagon Breathing',  tagline: 'Trace the hexagon',  game: 'hexagon',    locked: true,  placeholder: false, shape: 'hexagon'  },
    { id: 'flower',   name: 'Flower Breathing',   tagline: 'Trace the flower',   game: 'flower',     locked: true,  placeholder: false, shape: 'flower'   },
    { id: 'p3',       name: 'more breath soon', tagline: '',                    game: 'placeholder', locked: true,  placeholder: true,  shape: 'mystery' },
    { id: 'p4',       name: 'more breath soon', tagline: '',                    game: 'placeholder', locked: true,  placeholder: true,  shape: 'mystery' },
  ]

  // Visible window: distance from center within which cards are rendered
  const MAX_DISTANCE = 4

  let activeIndex = games.findIndex(g => g.id === 'square')  // = 3

  // ───────────────────────────────────────────────────────────────
  // SVG shape factory
  // ───────────────────────────────────────────────────────────────
  function shapeSVG(kind) {
    const stroke = 'rgba(62,94,82,0.85)'
    const sw = 6
    switch (kind) {
      case 'square':
        return `<svg viewBox="0 0 100 100" fill="none">
          <rect x="14" y="14" width="72" height="72" rx="22" ry="22" stroke="${stroke}" stroke-width="${sw}"/>
        </svg>`
      case 'hexagon':
        return `<svg viewBox="0 0 100 100" fill="none">
          <polygon points="50,10 86,30 86,70 50,90 14,70 14,30" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>
        </svg>`
      case 'infinity':
        return `<svg viewBox="0 0 120 60" fill="none">
          <path d="M30 30 C30 10 50 10 60 30 C70 50 90 50 90 30 C90 10 70 10 60 30 C50 50 30 50 30 30 Z" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>
        </svg>`
      case 'flower':
        return `<svg viewBox="0 0 100 100" fill="none">
          <g stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="50" cy="50" r="12"/>
            <ellipse cx="50" cy="22" rx="14" ry="18"/>
            <ellipse cx="78" cy="50" rx="18" ry="14"/>
            <ellipse cx="50" cy="78" rx="14" ry="18"/>
            <ellipse cx="22" cy="50" rx="18" ry="14"/>
          </g>
        </svg>`
      case 'mystery':
      default:
        // Three small dots — "more to come" without implying a question
        return `<svg viewBox="0 0 100 100" fill="none">
          <circle cx="28" cy="50" r="5" fill="${stroke}"/>
          <circle cx="50" cy="50" r="5" fill="${stroke}"/>
          <circle cx="72" cy="50" r="5" fill="${stroke}"/>
        </svg>`
    }
  }

  function lockBadge() {
    return `<div class="lock-badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="11" width="16" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </div>`
  }

  // ───────────────────────────────────────────────────────────────
  // Render
  // ───────────────────────────────────────────────────────────────
  const carousel = document.getElementById('carousel')

  function render() {
    carousel.innerHTML = ''
    games.forEach((g, i) => {
      const d = i - activeIndex
      const el = document.createElement('div')
      el.className = 'card'
      el.dataset.game = g.game
      el.dataset.d = d
      el.dataset.index = i
      if (g.locked) el.classList.add('locked')
      if (g.placeholder) el.classList.add('placeholder')
      if (Math.abs(d) > MAX_DISTANCE) el.classList.add('offscreen')

      el.innerHTML = `
        ${g.locked ? lockBadge() : ''}
        <div class="card-inner">
          <div class="card-art">
            <div class="card-shape">${shapeSVG(g.shape)}</div>
            <div class="card-name">${g.name}</div>
            ${g.tagline ? `<div class="card-tagline">${g.tagline}</div>` : ''}
          </div>
        </div>
      `
      el.addEventListener('click', () => handleCardClick(i))
      carousel.appendChild(el)
    })
    updateChevrons()
  }

  function updateChevrons() {
    document.getElementById('prev').disabled = activeIndex === 0
    document.getElementById('next').disabled = activeIndex === games.length - 1
  }

  // ───────────────────────────────────────────────────────────────
  // Interactions
  // ───────────────────────────────────────────────────────────────
  function go(delta) {
    const next = Math.max(0, Math.min(games.length - 1, activeIndex + delta))
    if (next === activeIndex) return
    activeIndex = next
    render()
  }

  function handleCardClick(i) {
    if (i !== activeIndex) {
      activeIndex = i
      render()
      return
    }
    const g = games[i]
    if (g.locked) {
      flashComingSoon()
    } else {
      // In the real app: navigate to /games/{g.id}
      flashEnter(g.name)
    }
  }

  function flashComingSoon() {
    const el = document.getElementById('comingSoon')
    el.classList.add('visible')
    el.querySelector('.coming-soon-text').textContent = 'Coming Soon'
    setTimeout(() => el.classList.remove('visible'), 1400)
  }

  function flashEnter(name) {
    const el = document.getElementById('comingSoon')
    el.classList.add('visible')
    el.querySelector('.coming-soon-text').textContent = `→ ${name}`
    setTimeout(() => el.classList.remove('visible'), 1400)
  }

  document.getElementById('prev').addEventListener('click', () => go(-1))
  document.getElementById('next').addEventListener('click', () => go(+1))

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); go(-1) }
    if (e.key === 'ArrowRight') { e.preventDefault(); go(+1) }
    if (e.key === 'Enter')      { handleCardClick(activeIndex) }
  })

  // Touch swipe — pointer events
  let dragStartX = null
  const SWIPE_THRESHOLD = 40
  const wrap = document.querySelector('.carousel-wrap')

  wrap.addEventListener('pointerdown', (e) => {
    dragStartX = e.clientX
  })
  wrap.addEventListener('pointerup', (e) => {
    if (dragStartX === null) return
    const dx = e.clientX - dragStartX
    dragStartX = null
    if (Math.abs(dx) > SWIPE_THRESHOLD) {
      go(dx < 0 ? +1 : -1)
    }
  })
  wrap.addEventListener('pointercancel', () => { dragStartX = null })

  // Dismiss "Coming Soon" by clicking anywhere on it
  document.getElementById('comingSoon').addEventListener('click', (e) => {
    e.currentTarget.classList.remove('visible')
  })

  render()
</script>
</body>
</html>
