// ── Shared helpers ──────────────────────────────────────────────────────────
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0
    let t = Math.imul(a ^ (a >>> 15), 1 | a)
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296
  }
}

// One feathered streak — squashed/rotated radial gradient, soft on every side.
function streak(ctx, cx, cy, len, thick, angle, rgb, alpha) {
  ctx.save()
  ctx.translate(cx, cy)
  ctx.rotate(angle)
  ctx.scale(1, thick / len)
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, len / 2)
  g.addColorStop(0,    `rgba(${rgb},${alpha.toFixed(3)})`)
  g.addColorStop(0.45, `rgba(${rgb},${(alpha * 0.55).toFixed(3)})`)
  g.addColorStop(1,    `rgba(${rgb},0)`)
  ctx.fillStyle = g
  ctx.beginPath()
  ctx.arc(0, 0, len / 2, 0, Math.PI * 2)
  ctx.fill()
  ctx.restore()
}

// A loose jittered bundle of streaks around a shared center/angle.
function band(ctx, b, w, h) {
  const rnd = mulberry32(b.seed)
  const cx = b.cx * w, cy = b.cy * h
  const len = b.len * w, thick = b.thick * h
  const dx = Math.cos(b.angle), dy = Math.sin(b.angle)
  const px = -dy, py = dx
  for (let i = 0; i < b.count; i++) {
    const along = (rnd() - 0.5) * len * 0.5
    const perp  = (rnd() - 0.5) * thick
    const sx = cx + dx * along + px * perp
    const sy = cy + dy * along + py * perp
    const sl = len * (0.45 + rnd() * 0.55)
    const st = thick * (0.18 + rnd() * 0.35)
    const sa = b.angle + (rnd() - 0.5) * 0.14
    const al = b.alpha * (0.55 + rnd() * 0.70)
    streak(ctx, sx, sy, sl, st, sa, b.tone, al)
  }
}

// A big soft elliptical wash — for tonal "masses" behind fine wisps (v4/v5).
function sheet(ctx, cx, cy, rw, rh, angle, rgb, alpha) {
  ctx.save()
  ctx.translate(cx, cy)
  ctx.rotate(angle)
  ctx.scale(1, rh / rw)
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rw / 2)
  g.addColorStop(0,   `rgba(${rgb},${alpha.toFixed(3)})`)
  g.addColorStop(0.6, `rgba(${rgb},${(alpha * 0.6).toFixed(3)})`)
  g.addColorStop(1,   `rgba(${rgb},0)`)
  ctx.fillStyle = g
  ctx.beginPath()
  ctx.arc(0, 0, rw / 2, 0, Math.PI * 2)
  ctx.fill()
  ctx.restore()
}

// A curving "hero" sweep — a chain of overlapping streaks along waypoints,
// each segment's angle following the local direction, to fake one continuous
// flowing curve (like the reference photo's big diagonal wisp).
function heroSweep(ctx, points, w, h, thickFrac, rgb, alpha, seed) {
  const rnd = mulberry32(seed)
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i], b = points[i + 1]
    const ax = a[0] * w, ay = a[1] * h
    const bx = b[0] * w, by = b[1] * h
    const segAngle = Math.atan2(by - ay, bx - ax)
    const segLen   = Math.hypot(bx - ax, by - ay)
    const midX = (ax + bx) / 2, midY = (ay + by) / 2
    const thick = thickFrac * w * (0.7 + rnd() * 0.6)
    streak(ctx, midX, midY, segLen * 1.35, thick, segAngle, rgb, alpha * (0.75 + rnd() * 0.5))
  }
}

function drawTriangleContext(ctx, w, h) {
  const R = Math.min(w * 0.40, h * 0.44), cx = w / 2, cy = h / 2, r = R * 0.18
  const hx = R * Math.cos(Math.PI / 6), hy = R * 0.5
  const V = [{x: cx - hx, y: cy + hy}, {x: cx, y: cy - R}, {x: cx + hx, y: cy + hy}]
  function tri(ctx, verts, rad) {
    const n = verts.length
    const m = (a, b) => ({x: (a.x + b.x) / 2, y: (a.y + b.y) / 2})
    const s = m(verts[0], verts[1])
    ctx.moveTo(s.x, s.y)
    for (let i = 1; i <= n; i++) {
      const cn = verts[i % n], nx = verts[(i + 1) % n], nm = m(cn, nx)
      ctx.arcTo(cn.x, cn.y, nm.x, nm.y, rad)
    }
    ctx.closePath()
  }
  const lw = ((2 * R) * 0.0728) * 2 + 8
  ctx.beginPath(); tri(ctx, V, r)
  ctx.lineWidth = lw + 7; ctx.strokeStyle = 'rgba(40,52,68,0.22)'; ctx.stroke()
  const g = ctx.createRadialGradient(cx, cy, Math.max(0, R * 0.5 - lw / 2), cx, cy, R + lw / 2)
  g.addColorStop(0, '#A7B6C2'); g.addColorStop(0.4, '#93A4B2'); g.addColorStop(1, '#7C8D9C')
  ctx.beginPath(); tri(ctx, V, r)
  ctx.lineWidth = lw; ctx.lineJoin = 'round'; ctx.strokeStyle = g; ctx.stroke()
}

  // Broad soft tonal masses first (background layer).
  sheet(ctx, w * 0.40, h * 0.10, w * 1.1, h * 0.16, -0.06, WISP_LIGHT, 0.16, )
  sheet(ctx, w * 0.65, h * 0.20, w * 0.9,  h * 0.14, -0.18, WISP_DEEP,  0.10)
  sheet(ctx, w * 0.30, h * 0.32, w * 0.8,  h * 0.13, -0.24, WISP_SHADE, 0.11)
  sheet(ctx, w * 0.62, h * 0.44, w * 0.7,  h * 0.12, -0.26, WISP_DEEP,  0.08)
  // Two curving hero flow-lines carrying the shadow tone (light+dark contrast
  // within the cloud mass, like the shaded underside in the reference).
  heroSweep(ctx, [[0.04,0.03],[0.30,0.09],[0.58,0.17],[0.84,0.15],[0.99,0.09]], w, h, 0.06,  WISP_LIGHT, 0.26, 301)
  heroSweep(ctx, [[0.12,0.20],[0.36,0.30],[0.54,0.42],[0.64,0.56],[0.70,0.70]], w, h, 0.05,  WISP_DEEP,  0.22, 302)
  // Fine wisps on top for texture.
  const WISPS = [
    { cx: 0.24, cy: 0.14, len: 0.55, thick: 0.05, angle: -0.16, count: 6, tone: WISP_LIGHT, alpha: 0.12, seed: 33 },
    { cx: 0.68, cy: 0.10, len: 0.45, thick: 0.045,angle: -0.10, count: 5, tone: WISP_LIGHT, alpha: 0.11, seed: 47 },
    { cx: 0.44, cy: 0.36, len: 0.42, thick: 0.04, angle: -0.28, count: 5, tone: WISP_SHADE, alpha: 0.10, seed: 88 },
    { cx: 0.20, cy: 0.48, len: 0.36, thick: 0.035,angle: -0.30, count: 4, tone: WISP_LIGHT, alpha: 0.08, seed: 97 },
  ]
  for (const b of WISPS) band(ctx, b, w, h)
}

// ── Variant 5 — Closest to the reference photo ──────────────────────────────
function variant5(ctx, w, h) {
  // More saturated 3-stop sky — pale/cloud-heavy top fading into vivid teal-blue.
  const sky = ctx.createLinearGradient(0, 0, 0, h)
  sky.addColorStop(0,    '#D9E7EE')
  sky.addColorStop(0.42, '#8FC2DC')
  sky.addColorStop(1,    '#2E93BE')
  ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h)

  // Dense white cloud mass across the top — many overlapping soft masses.
  sheet(ctx, w * 0.30, h * 0.05, w * 1.3, h * 0.16, -0.03, WISP_LIGHT, 0.55)
  sheet(ctx, w * 0.70, h * 0.03, w * 1.0, h * 0.14, -0.02, WISP_LIGHT, 0.50)
  sheet(ctx, w * 0.50, h * 0.11, w * 1.2, h * 0.13, -0.06, WISP_LIGHT, 0.40)
  sheet(ctx, w * 0.20, h * 0.14, w * 0.7, h * 0.10, -0.10, WISP_SHADE, 0.22)
  sheet(ctx, w * 0.75, h * 0.15, w * 0.6, h * 0.09, -0.10, WISP_SHADE, 0.20)

  // The big curving diagonal "V" sweep — the photo's signature flow, carrying
  // both the light and the deep shadow tone for real light/dark contrast.
  heroSweep(ctx, [[0.02,0.16],[0.24,0.19],[0.46,0.24],[0.58,0.32],[0.60,0.44]], w, h, 0.075, WISP_LIGHT, 0.34, 401)
  heroSweep(ctx, [[0.06,0.20],[0.26,0.24],[0.44,0.30],[0.55,0.40],[0.58,0.52]], w, h, 0.05,  WISP_DEEP,  0.26, 402)
  heroSweep(ctx, [[0.55,0.30],[0.70,0.34],[0.90,0.32],[1.00,0.28]], w, h, 0.05,  WISP_LIGHT, 0.26, 403)
  heroSweep(ctx, [[0.40,0.40],[0.52,0.48],[0.58,0.58],[0.60,0.68]], w, h, 0.045, WISP_LIGHT, 0.24, 404)
  heroSweep(ctx, [[0.44,0.44],[0.54,0.52],[0.58,0.60]], w, h, 0.035, WISP_DEEP, 0.20, 405)

  // Sparser open-sky wisps lower down, thinning out toward clear teal.
  const WISPS = [
    { cx: 0.20, cy: 0.30, len: 0.40, thick: 0.045, angle: -0.20, count: 5, tone: WISP_LIGHT, alpha: 0.16, seed: 61 },
    { cx: 0.78, cy: 0.42, len: 0.30, thick: 0.035, angle: -0.16, count: 4, tone: WISP_LIGHT, alpha: 0.13, seed: 79 },
    { cx: 0.30, cy: 0.58, len: 0.26, thick: 0.03,  angle: -0.22, count: 3, tone: WISP_LIGHT, alpha: 0.10, seed: 88 },
    { cx: 0.68, cy: 0.62, len: 0.22, thick: 0.025, angle: -0.18, count: 3, tone: WISP_LIGHT, alpha: 0.08, seed: 97 },
  ]
  for (const b of WISPS) band(ctx, b, w, h)
}

const VARIANTS = [
  { fn: variant1, title: '1 — Minimal (shipped floor)', desc: 'Sparse, faint scattered wisps. This is the current game background — nothing should go below this in density or contrast.' },
  { fn: variant2, title: '2 — More presence', desc: 'Same soft palette, more streaks per band and a touch more opacity. Denser sky, still no hard edges or strong contrast.' },
  { fn: variant3, title: '3 — Directional flow', desc: 'Adds a couple of long curving "hero" sweeps on top of the fine texture, echoing the reference’s diagonal drift rather than scattered isolated wisps.' },
  { fn: variant4, title: '4 — Layered depth', desc: 'Broad soft tonal masses behind the wisps, plus a deeper shadow tone mixed into the sweeps for gentle light/dark within the cloud mass. All edges stay fully feathered.' },
  { fn: variant5, title: '5 — Closest to reference', desc: 'Sky shifts to a more saturated teal-blue like the photo. Dense pale cloud mass up top, a bold diagonal light+shadow sweep through the middle, thinning to open sky below.' },
]

const grid = document.getElementById('grid')
for (const v of VARIANTS) {
  const card = document.createElement('div')
  card.className = 'card'
  const canvas = document.createElement('canvas')
  const W = 300, H = 460, dpr = window.devicePixelRatio || 1
  canvas.width = W * dpr; canvas.height = H * dpr
  canvas.style.aspectRatio = `${W} / ${H}`
  const ctx = canvas.getContext('2d')
  ctx.scale(dpr, dpr)
  v.fn(ctx, W, H)
  drawTriangleContext(ctx, W, H)
  const title = document.createElement('div')
  title.className = 'title'; title.textContent = v.title
  const desc = document.createElement('div')
  desc.className = 'desc'; desc.textContent = v.desc
  card.appendChild(canvas); card.appendChild(title); card.appendChild(desc)
  grid.appendChild(card)
}
