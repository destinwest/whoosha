<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!--
    Whoosha — meadow background ground texture
    Seven grass clumps of varied size and density (2-7 strokes each), scattered
    with bare areas between. Blade lengths range 4-13px for vertical variation.
    Sparse leaf-toned specks occupy bare areas. Designed to read as random
    distribution, not uniform lawn. Marks kept >=8px from edges for seamless
    tiling.
    Used as a CanvasPattern drawn into buildMeadowBg after the base gradient
    and before the screen-blend lighting.
  -->

  <!-- Leaf-toned specks (very sparse — hints of fallen leaves between clumps) -->
  <g fill="#897a4a" opacity="0.28">
    <circle cx="62"  cy="110" r="0.8"/>
    <circle cx="158" cy="90"  r="0.7"/>
    <circle cx="105" cy="175" r="0.9"/>
    <circle cx="220" cy="175" r="0.6"/>
    <circle cx="35"  cy="155" r="0.7"/>
    <circle cx="170" cy="240" r="0.8"/>
  </g>

  <!-- Grass clumps — 8 patches, varied size + density + blade height -->
  <g stroke="#4a6630" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.34">
    <!-- Clump A — top-left (6 strokes, heights 5-12) -->
    <path d="M 42 70 q 1 -2 0 -7"/>
    <path d="M 48 62 q -1 -2 0 -8"/>
    <path d="M 55 68 q 1 -3 -1 -10"/>
    <path d="M 50 75 q 0 -2 1 -5"/>
    <path d="M 58 72 q -1 -2 0 -7"/>
    <path d="M 45 78 q 1 -3 -2 -12"/>

    <!-- Clump B — top-right (5 strokes, heights 4-11) -->
    <path d="M 162 55 q 1 -3 0 -7"/>
    <path d="M 168 48 q -1 -2 0 -11"/>
    <path d="M 175 52 q 1 -2 -1 -4"/>
    <path d="M 180 58 q -1 -3 0 -8"/>
    <path d="M 173 62 q 1 -3 -2 -9"/>

    <!-- Clump C — middle-left (7 strokes, heights 5-13) -->
    <path d="M 82 135 q 1 -2 0 -7"/>
    <path d="M 88 128 q -1 -3 0 -13"/>
    <path d="M 95 132 q 1 -2 -1 -5"/>
    <path d="M 92 142 q 0 -2 1 -9"/>
    <path d="M 100 138 q -1 -3 0 -11"/>
    <path d="M 85 145 q 1 -2 -2 -6"/>
    <path d="M 87 122 q -1 -2 1 -8"/>

    <!-- Clump E — bottom-left (6 strokes, heights 4-12) -->
    <path d="M 38 205 q 1 -2 0 -7"/>
    <path d="M 45 198 q -1 -2 0 -12"/>
    <path d="M 52 202 q 1 -3 -1 -7"/>
    <path d="M 48 210 q 0 -2 1 -9"/>
    <path d="M 56 207 q -1 -2 0 -4"/>
    <path d="M 42 215 q 1 -3 -2 -10"/>

    <!-- Clump F — bottom-right (5 strokes, heights 5-11) -->
    <path d="M 148 225 q 1 -2 0 -7"/>
    <path d="M 155 218 q -1 -3 0 -11"/>
    <path d="M 162 222 q 1 -2 -1 -5"/>
    <path d="M 158 230 q 0 -2 1 -8"/>
    <path d="M 150 232 q -1 -2 1 -6"/>

    <!-- Clump G — center-top, tiny lonely-blade clump (2 strokes) -->
    <path d="M 125 100 q 1 -2 0 -9"/>
    <path d="M 132 92 q -1 -3 0 -7"/>

    <!-- Clump H — top-right interior (4 strokes, heights 5-11) -->
    <path d="M 220 113 q 1 -2 0 -8"/>
    <path d="M 227 105 q -1 -3 0 -11"/>
    <path d="M 232 110 q 1 -2 -1 -5"/>
    <path d="M 224 118 q 0 -2 1 -9"/>
  </g>
</svg>
